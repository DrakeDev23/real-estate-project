<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven - Login</title>
    <link rel="icon" href="images/logo.png" sizes="16x16" type ="image/png">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <section class="hero-wrapper">
        <header>
            <div class="logo">
                <img src="images/logo.png" alt="publika4">
                <a href="test.html" class="haven">HAVEN</a>
            </div>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav class="header" id="navMenu">
                <a href="index.html">Home</a>
                <a href="buy.html">Buy</a>
                <a href="buy.html">Rent</a>
                <a href="sell.html">Sell</a>
                <a href="agents.html">Find Agent</a>
                <a href="chatbot.html">AI Agent</a>
            </nav>
        </header>

        <div class="container-wrapper">
            <div class="container">
                <h1>Login</h1>
                <form id="loginForm">
                    
                    <label>Username:</label>
                    <div class="input-group">
                        <span class="icon"><ion-icon name="person-sharp"></ion-icon></span>
                        <input type="text" id="username" name="username" placeholder="Enter username">
                    </div>

                    <label>Password:</label>
                    <div class="input-group password-group">
                        <span class="icon"><ion-icon name="lock-closed-sharp"></ion-icon></span>
                            <input type="password" id="password" name="password" placeholder="Enter password">
                        <span class="toggle-password" id="togglePassword">
                            <ion-icon name="eye-outline"></ion-icon>
                        </span>
                    </div>
                    <input type="submit" id="btn" value="Login">

                    <p id="message"></p>

                    <div class="register-link">
                        <p>Don't have account?</p> 
                        <a href="registration.html">Registration</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="javascript/login.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
