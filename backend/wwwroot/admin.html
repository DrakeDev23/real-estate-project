<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Real Estate</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="container">
<aside class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
        <li class="active" data-section="requests">Requests</li>
        <li data-section="properties">Properties</li>
        <li id="logoutBtn">Logout</li>
    </ul>
</aside>
<main class="main">
    <header>
        <h1>Admin Dashboard</h1>
    </header>
    <section id="requests" class="section">
        <h2>Agent Requests</h2>
        <table>
            <thead>
                <tr>
                    <th>Agent</th>
                    <th>Agency</th>
                    <th>User Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="requestsTable">
            </tbody>
        </table>
    </section>
    <section id="properties" class="section" style="display:none">
        <h2>Manage Properties</h2>
        <div class="form-group">
            <input id="propName" type="text" placeholder="Property Name">
            <input id="propAgent" type="text" placeholder="Agent Name">
            <input id="propPrice" type="number" placeholder="Price">
            <button id="addPropertyBtn">Add Property</button>
        </div>
        <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Agent</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="propertiesTable">
            </tbody>
        </table>
    </section>
</main>
</div>
<script src="javascript/admin.js"></script>
</body>
</html>
