<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven - Registration</title>
    <link rel="icon" href="images/logo.png"  type ="image/png">
    <link rel="stylesheet" href="css/registration.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <section class="hero-wrapper">
        <header>
            <div class="logo">
                <img src="images/logo.png" alt="publika4">
                <a href="test.html" class="haven">HAVEN</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav class="header" id="nav-menu">
                <a href="index.html">Home</a>
                <a href="buy.html">Buy</a>
                <a href="rent.html">Rent</a>
                <a href="sell.html">Sell</a>
                <a href="agents.html">Find Agent</a>
                <a href="chatbot.html">AI Agent</a>
                <a href="login.html">Login</a>
            </nav>
        </header>
        <div class="container-wrapper">
            <div class="container">
                <h1>Register</h1>
                <div id="formMessage" class="form-message"></div>
                <form id="registerForm">

                    <label>Username:</label>
                    <div class="input-group">
                        <span class="icon"><ion-icon name="person-sharp"></ion-icon></span>
                        <input type="text" id="username" name="username" placeholder="Enter username" required>
                    </div>

                    <label>Email:</label>
                    <div class="input-group">
                        <span class="icon"><ion-icon name="mail"></ion-icon></span>
                        <input type="email" id="email" name="email" placeholder="Enter email" required>
                    </div>

                    <label>Password:</label>
                        <div class="input-group password-group">
                            <span class="icon"><ion-icon name="lock-closed-sharp"></ion-icon></span>
                                <input type="password" id="password" name="password" placeholder="Enter password" required>
                            <span class="toggle-password" id="togglePassword">
                                <ion-icon name="eye-outline"></ion-icon>
                            </span>
                        </div>
                    <input type="submit" id="btn" value="Register">
                    
                    <div class="login-link">
                        <p>Already have an account?</p> 
                        <a href="login.html">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="javascript/registration.js" defer></script>
</body>
</html>
